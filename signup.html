<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CruiseSplit - Join the Crew</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&amp;family=Montserrat:wght@600;700&amp;family=Plus+Jakarta+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#001f27",
                    "surface-bright": "#fff8f5",
                    "on-primary-fixed-variant": "#004b74",
                    "background": "#fff8f5",
                    "primary-fixed": "#cde5ff",
                    "on-surface": "#1f1b18",
                    "surface-container-highest": "#eae1dc",
                    "on-surface-variant": "#404850",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb59c",
                    "tertiary": "#9d370c",
                    "on-error-container": "#93000a",
                    "surface-container": "#f5ece7",
                    "secondary-container": "#50d9fe",
                    "on-tertiary-fixed-variant": "#822800",
                    "inverse-primary": "#94ccff",
                    "surface-variant": "#eae1dc",
                    "surface-dim": "#e1d8d3",
                    "secondary": "#00677d",
                    "on-secondary-fixed-variant": "#004e5f",
                    "on-tertiary-fixed": "#380c00",
                    "on-primary-fixed": "#001d32",
                    "secondary-fixed-dim": "#4cd6fb",
                    "primary": "#005d90",
                    "on-error": "#ffffff",
                    "inverse-surface": "#34302c",
                    "tertiary-container": "#be4f24",
                    "error": "#ba1a1a",
                    "on-secondary": "#ffffff",
                    "primary-container": "#0077b6",
                    "on-tertiary-container": "#fff6f3",
                    "primary-fixed-dim": "#94ccff",
                    "surface-container-low": "#fbf2ed",
                    "on-primary": "#ffffff",
                    "surface-tint": "#006399",
                    "tertiary-fixed": "#ffdbcf",
                    "surface-container-high": "#efe6e1",
                    "on-primary-container": "#f3f7ff",
                    "secondary-fixed": "#b3ebff",
                    "on-background": "#1f1b18",
                    "on-secondary-container": "#005c70",
                    "outline": "#707881",
                    "surface": "#fff8f5",
                    "error-container": "#ffdad6",
                    "inverse-on-surface": "#f8efea",
                    "outline-variant": "#bfc7d1",
                    "surface-container-lowest": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-margin": "32px",
                    "card-gap": "12px",
                    "container-padding": "24px",
                    "base": "8px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Montserrat"],
                    "headline-lg": ["Montserrat"],
                    "title-md": ["Montserrat"],
                    "caption": ["Plus Jakarta Sans"],
                    "display-lg": ["Montserrat"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "label-md": ["JetBrains Mono"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                    "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                    "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                    "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500" }]
            }
          }
        }
      }
    </script>
<style>
        /* Custom Input styling to mimic the "Wave" requirement without data-uris */
        .input-wave {
            border-bottom-width: 2px;
            border-bottom-style: dashed;
            border-bottom-color: theme('colors.primary');
            transition: all 0.3s ease;
        }
        .input-wave:focus {
            border-bottom-style: solid;
            border-bottom-color: theme('colors.secondary-container');
            box-shadow: 0 4px 6px -1px rgba(80, 217, 254, 0.1);
        }

        /* Subtle buoyant animation for the card */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface antialiased min-h-screen flex items-center justify-center p-container-padding relative overflow-hidden">
<!-- Background Decoration: Tropical Sunset Gradient & Palms -->
<div class="absolute inset-0 z-0 bg-gradient-to-br from-tertiary-fixed-dim via-error-container to-primary-fixed-dim opacity-60"></div>
<div class="absolute inset-0 z-0 bg-cover bg-bottom opacity-20 mix-blend-multiply" data-alt="A lush tropical sunset scene with silhouetted palm trees swaying against a vibrant, warm gradient sky of coral, pink, and deep sunset blue. The aesthetic is modern, clean, and optimistic, fitting a high-end luxury cruise vacation app. Soft lighting and minimal details." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBkbAsEuO_FcqihzZO5uVbCG2kRe1S8j0hOkcidw_mPrPx4DQCwP5uxlDep9TmbUqmACLUq-2xA6KJr97TSKq5BKX8bA9_kYph_N_fgtsATGpwaPL4crVP7rMQKPYSNmzJD76kcgIrbhCB1J4T6Ic-hxf7mRg1sNnaSFznMCDV4o_QX1jqQuNSxBxzJEDkIlXIw6bnBM7miRnClNF7ltYT9GUurESzfz8zJ-IRiqL8iWeDhhe02ZqF5FFyE_ZcFLkGy7GloLJPh__4')"></div>
<!-- Main Signup Card (Shipping Manifest / Boarding Pass Proportions) -->
<div class="relative z-10 w-full max-w-md bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_12px_48px_rgba(3,4,94,0.08)] animate-float backdrop-blur-sm border border-surface-container-high/50">
<!-- Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-on-primary-container mb-4 shadow-sm">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">sailing</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">Join the Crew</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Set sail on your next shared adventure.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Full Name -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline px-2">person</span>
<input class="w-full bg-transparent border-0 input-wave pl-10 pr-4 py-2 font-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant" id="fullName" placeholder="Captain Stubing" type="text"/>
</div>
</div>
<!-- Email -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline px-2">mail</span>
<input class="w-full bg-transparent border-0 input-wave pl-10 pr-4 py-2 font-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant" id="email" placeholder="captain@cruisesplit.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline px-2">lock</span>
<input class="w-full bg-transparent border-0 input-wave pl-10 pr-4 py-2 font-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Password Strength Bar -->
<div class="flex gap-2 h-1.5 mt-3">
<div class="flex-1 bg-tertiary rounded-full shadow-inner"></div> <!-- Weak (Coral) -->
<div class="flex-1 bg-surface-variant rounded-full"></div> <!-- Medium (Yellow/Warning placeholder) -->
<div class="flex-1 bg-surface-variant rounded-full"></div> <!-- Strong (Teal/Secondary placeholder) -->
</div>
<p class="font-caption text-caption text-on-surface-variant mt-1 text-right">Weak</p>
</div>
<!-- Primary Button (Boarding Pass Style) -->
<button class="relative w-full bg-tertiary text-on-tertiary font-title-md text-title-md py-4 px-6 rounded-lg overflow-hidden shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all mt-section-margin group" type="button">
<!-- Perforated Edge Detail -->
<div class="absolute -left-2 top-0 bottom-0 w-4 flex flex-col justify-evenly py-2 opacity-80">
<div class="w-3 h-3 bg-surface-container-lowest rounded-full"></div>
<div class="w-3 h-3 bg-surface-container-lowest rounded-full"></div>
<div class="w-3 h-3 bg-surface-container-lowest rounded-full"></div>
<div class="w-3 h-3 bg-surface-container-lowest rounded-full"></div>
</div>
<span class="relative z-10 flex items-center justify-center gap-2">
                    Start Your Journey
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-6 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already part of the crew? 
                <a class="font-label-md text-primary hover:text-secondary underline decoration-2 underline-offset-4 transition-colors" href="#">Log in.</a>
</p>
</div>
</div>
</body></html>
